name: Generate app-list.json

on:
  push:
    branches:
      - main
    paths:
      - "apps/**/manifest.json"
      - "apps/**/main.py"
      - "scripts/generate_app_list.py"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0        # full history so git log works for each app

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generate app-list.json
        run: python scripts/generate_app_list.py

      - name: Commit updated app-list.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add app-list.json
          if git diff --staged --quiet; then
            echo "app-list.json unchanged – nothing to commit"
          else
            git commit -m "chore: regenerate app-list.json [skip ci]"
            git push
          fi
